<svg xmlns="http://www.w3.org/2000/svg" width="760" height="150" viewBox="0 0 760 150" role="img" aria-labelledby="title desc">
  <title id="title">Contribution activity placeholder</title>
  <desc id="desc">Placeholder graphic shown until the profile refresh workflow generates the live contribution activity graph.</desc>
  <rect width="100%" height="100%" fill="transparent" />
  <text x="0" y="20" font-size="14" font-weight="600" fill="#93c5fd">Public contribution activity</text>
  <text x="0" y="54" font-size="13" fill="#64748b">The workflow will generate the live activity graph after the first successful run.</text>
  <rect x="0" y="80" width="12" height="12" rx="2" fill="#0f172a" />
  <rect x="18" y="80" width="12" height="12" rx="2" fill="#1d4ed8" />
  <rect x="36" y="80" width="12" height="12" rx="2" fill="#2563eb" />
  <rect x="54" y="80" width="12" height="12" rx="2" fill="#3b82f6" />
  <rect x="72" y="80" width="12" height="12" rx="2" fill="#60a5fa" />
</svg>
