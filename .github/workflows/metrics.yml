name: Generate Metrics

on:
  workflow_dispatch:
  schedule:
    - cron: "11 5 * * *"

permissions:
  contents: write

concurrency:
  group: generate-metrics
  cancel-in-progress: true

jobs:
  metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Generate classic metrics
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: ghostlucius
          filename: assets/metrics-classic.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Rome
          plugin_introduction: no
          plugin_languages: no
          plugin_followup: no
          plugin_isocalendar: no
          plugin_achievements: no

      - name: Generate isocalendar metrics
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: ghostlucius
          filename: assets/metrics-isocalendar.svg
          base: ""
          config_timezone: Europe/Rome
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
